<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мої вподобані породи — HappyTails</title>
    <meta name="description" content="Ваш персональний список улюблених порід собак. Зберігайте найкращі профілі, щоб мати швидкий доступ до інформації про майбутнього друга.">
    <meta name="keywords" content="улюблені собаки, обране, збережені породи, список бажань собаки">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&family=Raleway:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#ddd6fe',
                            dark: '#6d28d9',
                            bg: '#f0f9ff',
                        }
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        display: ['Raleway', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-bg dark:bg-gray-900 text-gray-800 dark:text-white transition-colors duration-300 font-sans">

    <nav class="bg-brand-light dark:bg-gray-800 shadow-md sticky top-0 z-50 transition-colors duration-300">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="text-xl md:text-2xl font-black text-brand-dark dark:text-violet-400 flex items-center gap-2 shrink-0 font-display">
                <i class="fa-solid fa-paw"></i>
                <span>HappyTails</span>
            </a>
            <div class="flex items-center gap-5">
                <a href="index.html" class="text-brand-dark dark:text-violet-400 font-bold hover:underline font-display">Головна</a>
                <button id="theme-toggle" class="p-2 rounded-full bg-white/50 dark:bg-gray-700 text-gray-700 dark:text-yellow-400 shadow-sm transition-all">
                    <i id="theme-toggle-dark-icon" class="fa-solid fa-moon"></i>
                    <i id="theme-toggle-light-icon" class="fa-solid fa-sun hidden"></i>
                </button>
            </div>
        </div>
    </nav>
    <main class="container mx-auto py-10 px-4">
    <a href="index.html" class="inline-flex items-center gap-2 text-violet-700 dark:text-violet-400 font-bold mb-6 hover:gap-4 transition-all font-display text-lg">
        <i class="fa-solid fa-arrow-left"></i> Назад до списку
    </a>

    <h1 class="text-4xl md:text-5xl font-black text-brand-dark dark:text-violet-400 uppercase tracking-tighter font-display flex items-center gap-4 mb-10">
        <i class="fa-solid fa-heart text-red-500 animate-pulse"></i> Вподобане
    </h1>

    <div id="favorites-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>

    <div id="empty-state" class="hidden py-20 text-center">
        <i class="fa-solid fa-dog text-6xl text-violet-200 mb-4"></i>
        <p class="text-xl text-gray-500">Ви ще нікого не вподобали...</p>
        <a href="index.html" class="mt-4 inline-block text-violet-600 font-bold hover:underline">Переглянути породи</a>
    </div>
</main>
    <footer class="bg-brand-light dark:bg-gray-800 py-10 mt-10 transition-colors duration-300 border-t border-brand-dark/10">
        <div class="container mx-auto px-4 text-center">
            <div class="text-2xl font-black text-brand-dark dark:text-violet-400 mb-3 font-display">
                <i class="fa-solid fa-paw"></i> HappyTails
            </div>
            <p class="text-brand-dark/70 dark:text-gray-400 text-lg italic">Зроблено з любов'ю до пухнастиків</p>
            <div class="mt-6 text-sm text-brand-dark/50 dark:text-gray-500 font-medium">
                © 2026
            </div>
        </div>
    </footer>
<script>
    // 1. ЛОГІКА ТЕМИ (щоб працював перемикач)
    const themeToggleBtn = document.getElementById('theme-toggle');
    const darkIcon = document.getElementById('theme-toggle-dark-icon');
    const lightIcon = document.getElementById('theme-toggle-light-icon');

    if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
        if(lightIcon) lightIcon.classList.remove('hidden');
        if(darkIcon) darkIcon.classList.add('hidden');
    }

    themeToggleBtn.addEventListener('click', function() {
        lightIcon.classList.toggle('hidden');
        darkIcon.classList.toggle('hidden');
        if (document.documentElement.classList.contains('dark')) {
            document.documentElement.classList.remove('dark');
            localStorage.setItem('color-theme', 'light');
        } else {
            document.documentElement.classList.add('dark');
            localStorage.setItem('color-theme', 'dark');
        }
    });

    // 2. ДАНІ ПРО ПОРОДИ (додай сюди всі свої породи)
    const breedsData = {
        'GermanShepherd': { name: 'Німецька вівчарка', img: 'Card1.webp', link: 'GermanShepherd.html' },
        'IrishWolfhound': { name: 'Ірландський вовкодав', img: 'Card2.webp', link: 'IrishWolfhound.html' },
        'YorkshireTerrier': { name: 'Йоркширський тер\'єр', img: 'Card3.webp', link: 'YorkshireTerrier.html' },
        'BorderCollie': { name: 'Бордер-колі', img: 'Card4.webp', link: 'BorderCollie.html' },
        'Doberman': { name: 'Доберман', img: 'Card5.webp', link: 'Doberman.html' },
        'Bolognese': { name: 'Болоньєз', img: 'Card6.webp', link: 'Bolognese.html' }
    };

    // 3. ЛОГІКА ВПОДОБАНИХ
    function displayFavorites() {
        const container = document.getElementById('favorites-container');
        const emptyState = document.getElementById('empty-state');
        const favorites = JSON.parse(localStorage.getItem('myFavorites')) || [];

        container.innerHTML = '';

        if (favorites.length === 0) {
            emptyState.classList.remove('hidden');
            return;
        }

        emptyState.classList.add('hidden');

        favorites.forEach(breedId => {
            const breed = breedsData[breedId];
            if (!breed) return;

            const card = `
                <div class="group relative bg-white/60 dark:bg-gray-800 rounded-3xl shadow-lg overflow-hidden border border-violet-200 dark:border-gray-700 transition-all">
                    <a href="${breed.link}">
                        <div class="relative h-64 overflow-hidden">
                            <img src="${breed.img}" alt="${breed.name}" class="w-full h-full object-cover group-hover:scale-110 transition-all duration-500">
                        </div>
                        <div class="p-6 text-center font-display">
                            <h3 class="text-xl font-bold text-violet-700 dark:text-violet-400">${breed.name}</h3>
                        </div>
                    </a>
                    <button onclick="removeFromFavorites('${breedId}')" class="absolute top-4 right-4 w-10 h-10 bg-white/90 dark:bg-gray-700 rounded-full text-red-500 shadow-md hover:scale-110 transition-all">
                        <i class="fa-solid fa-heart-crack"></i>
                    </button>
                </div>
            `;
            container.innerHTML += card;
        });
    }

    function removeFromFavorites(id) {
        let favorites = JSON.parse(localStorage.getItem('myFavorites')) || [];
        favorites = favorites.filter(item => item !== id);
        localStorage.setItem('myFavorites', JSON.stringify(favorites));
        displayFavorites();
    }

    // Запускаємо відображення при завантаженні
    displayFavorites();
</script>

</body>
</html>
